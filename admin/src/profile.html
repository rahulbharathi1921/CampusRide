<!DOCTYPE html>
<html>

<head>
    <title>CampusRide Admin Profiles</title>
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>ADMIN</h2>
            <a href="../dashboard/dashboard.html">Dashboard</a>
            <a href="profile.html" class="active">Profiles</a>
            <a href="../login/login.html" onclick="logout()">Logout</a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <h2>Admin Profiles</h2>

            <div class="profile-cards">
                <!-- Admin cards will be generated by JS -->
            </div>

        </main>

    </div>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Edit Profile</h3>
            <input type="text" id="editUsername" placeholder="Username">
            <input type="email" id="editEmail" placeholder="Email">
            <input type="text" id="editRole" placeholder="Role">
            <input type="password" id="editPassword" placeholder="Password">
            <button id="saveBtn" class="edit-btn">Save Changes</button>

        </div>
    </div>

    <script src="../assets/js/profile.js"></script>
</body>

</html>
